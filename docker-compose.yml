services:
  telegram-bot-api:
    build:
      context: .
      dockerfile: Dockerfile.botapi
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - downloads:/app/downloads
    restart: unless-stopped
    command: >
      --api-id=${TELEGRAM_API_ID}
      --api-hash=${TELEGRAM_API_HASH}
      --local
      --http-port=8081
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || curl -s http://localhost:8081/ > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 120s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build: .
    command: python -m src.bot
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    volumes:
      - downloads:/app/downloads
    mem_limit: 512m
    restart: unless-stopped

  worker:
    build: .
    command: rq worker --url ${REDIS_URL:-redis://redis:6379/0} video-downloads
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
      # Optional: mount Twitter cookies for yt-dlp (Netscape format from x.com)
      # Create an empty file first if you don't have cookies yet:
      #   touch twitter_cookies.txt
      - ./twitter_cookies.txt:/app/twitter_cookies.txt
    shm_size: 256m
    mem_limit: 2g
    # Scale workers: docker compose up --scale worker=2 (max for 2-core/8GB)
    restart: unless-stopped

  # Optional: RQ Dashboard for monitoring
  # rq-dashboard:
  #   image: eoranged/rq-dashboard
  #   environment:
  #     RQ_DASHBOARD_REDIS_URL: redis://redis:6379/0
  #   ports:
  #     - "9181:9181"
  #   depends_on:
  #     - redis

volumes:
  telegram-bot-api-data:
  redis-data:
  downloads: